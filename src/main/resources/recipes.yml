# ══════════════════════════════════════════════════════════
#  Recipe Definitions
#  All crafting recipes are defined here and loaded by
#  YamlRecipeLoader.  Ingredients can be:
#    - UPPERCASE names → vanilla Material  (e.g. IRON_INGOT)
#    - lowercase names → custom item from the item registry
#
#  Gating:
#    level: <n>        → requires Fishing level n
#    advancement: "x"  → requires advancement key (overrides level)
# ══════════════════════════════════════════════════════════


# ── Shaped Recipes ──────────────────────────────────────
shaped:



  # Harmony Rod — requires "Bucket Catcher" advancement
  harmony_rod_recipe:
    result: harmony_rod
    advancement: "fishing/bucket_catcher"
    pattern:
      - " F "
      - "FRF"
      - " F "
    ingredients:
      R: FISHING_ROD
      F:
        - COD
        - SALMON
        - PUFFERFISH
        - TROPICAL_FISH

  # Treasure Totem — Level 40
  treasure_totem_recipe:
    result: treasure_totem
    level: 40
    pattern:
      - "GGG"
      - "GCG"
      - "GGG"
    ingredients:
      C: CONDUIT
      G: GOLD_BLOCK

  # Display Case — Level 15
  display_case_recipe:
    result: display_case
    level: 15
    pattern:
      - "GGG"
      - "GCG"
      - "SSS"
    ingredients:
      G:
        - GLASS
        - WHITE_STAINED_GLASS
        - ORANGE_STAINED_GLASS
        - MAGENTA_STAINED_GLASS
        - LIGHT_BLUE_STAINED_GLASS
        - YELLOW_STAINED_GLASS
        - LIME_STAINED_GLASS
        - PINK_STAINED_GLASS
        - GRAY_STAINED_GLASS
        - LIGHT_GRAY_STAINED_GLASS
        - CYAN_STAINED_GLASS
        - PURPLE_STAINED_GLASS
        - BLUE_STAINED_GLASS
        - BROWN_STAINED_GLASS
        - GREEN_STAINED_GLASS
        - RED_STAINED_GLASS
        - BLACK_STAINED_GLASS
      C:
        - WHITE_CARPET
        - ORANGE_CARPET
        - MAGENTA_CARPET
        - LIGHT_BLUE_CARPET
        - YELLOW_CARPET
        - LIME_CARPET
        - PINK_CARPET
        - GRAY_CARPET
        - LIGHT_GRAY_CARPET
        - CYAN_CARPET
        - PURPLE_CARPET
        - BLUE_CARPET
        - BROWN_CARPET
        - GREEN_CARPET
        - RED_CARPET
        - BLACK_CARPET
      S:
        - POLISHED_ANDESITE_SLAB
        - ANDESITE_SLAB
        - POLISHED_DIORITE_SLAB
        - DIORITE_SLAB
        - POLISHED_GRANITE_SLAB
        - GRANITE_SLAB

  # Netherite Relic — Level 40
  netherite_relic_recipe:
    result: netherite_relic
    level: 40
    pattern:
      - "GNG"
      - " B "
      - "SSS"
    ingredients:
      G: GOLD_BLOCK
      N: NETHERITE_HELMET
      B: NETHERITE_BLOCK
      S: temple_slab

  # Lava Ring — Level 30
  lava_ring_recipe:
    result: lava_ring
    level: 30
    pattern:
      - " G "
      - "MRC"
      - " S "
    ingredients:
      G: ghast_membrane
      M: magma_residue
      R: smoldering_rod
      C: corrupted_gold
      S: crimson_scale

  # Trident Tier 1: Prismarine Harpoon — Level 8
  trident_1_recipe:
    result: trident_1
    level: 8
    pattern:
      - "  S"
      - " T "
      - "B  "
    ingredients:
      S: enchanted_guardian_scale
      T: TRIDENT
      B: enchanted_wet_bone

  # Trident Tier 2: Tidesplitter — Level 30
  trident_2_recipe:
    result: trident_2
    level: 19
    pattern:
      - " VP"
      - "VTV"
      - "DV "
    ingredients:
      V: enchanted_mossy_vine
      P: enchanted_ice_wing
      T: trident_1
      D: DIAMOND_BLOCK

  # Trident Tier 3: Dreadspear — Level 33
  trident_3_recipe:
    result: trident_3
