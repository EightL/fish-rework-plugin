# ══════════════════════════════════════════════════════════
#  Armor Sets
#  Each set defines: material_type, rarity, set_key (PDC key),
#  bonuses, optional leather_color, optional attribute_bonuses,
#  and per-piece stats.
#
#  bonus_key: the primary PDC bonus key applied per piece
#  extra_pdc: additional PDC stats per piece
#  attribute_bonuses: vanilla attribute modifiers per piece
#    (water_movement_efficiency, movement_speed, etc.)
# ══════════════════════════════════════════════════════════

armor_sets:
  # ── Scale Armor ─────────────────────────────────────────
  # +1.25 SCC, +1.25 SCD, +1.25 SCA per piece
  scale:
    material_type: LEATHER
    rarity: UNCOMMON
    set_key: scale_armor
    leather_color: [142, 177, 194]
    bonus_key: rare_creature_chance
    bonus_value: 1.25
    extra_pdc:
      sea_creature_defense: 1.25
      sea_creature_attack: 1.25
    attribute_bonuses:
      water_movement_efficiency: 0.075
    pieces:
      helmet:
        display_name: "Scale Helmet"
        trim_pattern: coast
        trim_material: copper
        armor: 2
        toughness: 0
        durability: 350
      chestplate:
        display_name: "Scale Chestplate"
        trim_pattern: raiser
        trim_material: copper
        armor: 6
        toughness: 0
        durability: 500
      leggings:
        display_name: "Scale Leggings"
        trim_pattern: tide
        trim_material: copper
        armor: 5
        toughness: 0
        durability: 450
      boots:
        display_name: "Scale Boots"
        trim_pattern: wayfinder
        trim_material: copper
        armor: 1
        toughness: 0
        durability: 300

  # ── Ironclad Armor ──────────────────────────────────────
  # +2.5 SCC, +2.5 SCD, +2.5 SCA per piece
  ironclad:
    material_type: IRON
    rarity: EPIC
    set_key: ironclad_armor
    bonus_key: rare_creature_chance
    bonus_value: 2.5
    extra_pdc:
      sea_creature_defense: 2.5
      sea_creature_attack: 2.5
    attribute_bonuses:
      water_movement_efficiency: 0.125
    pieces:
      helmet:
        display_name: "Ironclad Helmet"
        trim_pattern: raiser
        trim_material: copper
        armor: 3
        toughness: 2
      chestplate:
        material: LEATHER_CHESTPLATE
        leather_color: [175, 185, 208]
        display_name: "Ironclad Chestplate"
        trim_pattern: dune
        trim_material: iron
        armor: 8
        toughness: 2
      leggings:
        display_name: "Ironclad Leggings"
        trim_pattern: tide
        trim_material: copper
        armor: 6
        toughness: 2
      boots:
        material: LEATHER_BOOTS
        leather_color: [175, 185, 208]
        display_name: "Ironclad Boots"
        trim_pattern: ward
        trim_material: iron
        armor: 3
        toughness: 2

  # ── Dreadplate Armor ────────────────────────────────────
  # +5 SCC, +5 SCD, +5 SCA per piece
  dreadplate:
    material_type: NETHERITE
    rarity: LEGENDARY
    set_key: dreadplate_armor
    bonus_key: rare_creature_chance
    bonus_value: 5.0
    extra_pdc:
      sea_creature_defense: 5.0
      sea_creature_attack: 5.0
    attribute_bonuses:
      water_movement_efficiency: 0.175
    pieces:
      helmet:
        material: LEATHER_HELMET
        leather_color: [51, 50, 57]
        display_name: "Dreadplate Helmet"
        trim_pattern: silence
        trim_material: netherite
        armor: 3
        toughness: 3
        durability: 650
      chestplate:
        material: LEATHER_CHESTPLATE
        leather_color: [51, 50, 57]
        display_name: "Dreadplate Chestplate"
        trim_pattern: silence
        trim_material: netherite
        armor: 8
        toughness: 3
        durability: 800
      leggings:
        display_name: "Dreadplate Leggings"
        trim_pattern: sentry
        trim_material: netherite
        armor: 6
        toughness: 3
      boots:
        display_name: "Dreadplate Boots"
        trim_pattern: rib
        trim_material: redstone
        armor: 3
        toughness: 3

  # ── Deadman Set ─────────────────────────────────────────
  # +5 SCC, +5 SCD, +5 SCA per piece (base — night doubles in MobManager)
  deadman:
    material_type: LEATHER
    rarity: EPIC
    set_key: deadman_armor
    leather_color: [0, 0, 0]
    bonus_key: rare_creature_chance
    bonus_value: 5.0
    lore: "Armor of the drowned rider."
    lore_extra: "Stats double at night."
    lore_extra_color: DARK_PURPLE
    extra_pdc:
      sea_creature_defense: 5.0
      sea_creature_attack: 5.0
    pieces:
      helmet:
        material: LEATHER_HELMET
        base_item: dead_rider_head
        display_name: "Dead Rider's Head"
        armor: 3
        toughness: 2
        durability: 600
      chestplate:
        display_name: "Deadman Chestplate"
        trim_pattern: silence
        trim_material: netherite
        armor: 8
        toughness: 2
        durability: 750
      leggings:
        display_name: "Deadman Leggings"
        trim_pattern: silence
        trim_material: netherite
        armor: 6
        toughness: 2
        durability: 700
      boots:
        display_name: "Deadman Boots"
        trim_pattern: silence
        trim_material: netherite
        armor: 3
        toughness: 2
        durability: 550

