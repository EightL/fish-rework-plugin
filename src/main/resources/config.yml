# Fish Rework Configuration
# Plugin: Fish Rework v1.0.0

# Increment this only when making backwards-incompatible config changes.
config_version: 2

# Language file to load (lang_<locale>.yml)
locale: "en"

# Update checker — pings Modrinth on startup and notifies admins on join
update_checker:
  enabled: true
  # Set this to your Modrinth project ID or slug after publishing.
  # Leave blank to disable the check (e.g. during development).
  modrinth_project_id: ""

# Fishing XP Values
fishing:
  xp:
    cod: 10
    salmon: 15
    tropical_fish: 25
    pufferfish: 30
    junk: 5         # Trash items (leather, lily pad, etc.)
    treasure: 50    # Enchanted books, bows, etc.
    lava_catch: 30  # XP granted per successful lava fishing catch
  mob_experience_orbs:
    enabled: true
    multiplier: 0.4    # Converts 40% of fishing XP into vanilla XP orbs
    min: 1             # Minimum orb XP dropped by a sea creature with fishing XP
    max: 180           # Raised to preserve the 10x bump on high-XP creatures

# Leveling Formula
# Experience Required = base_xp * (level ^ exponent)
leveling:
  base_xp: 100
  exponent: 1.5
  max_level: 50

# Stat Bonus Scaling (per level)
# Values are percentages (e.g., 0.4 means +0.4% per level)
bonuses:
  double_catch_chance_per_level: 0.4  # At lvl 50 = 20%
  treasure_chance_increase_per_level: 0.3 # At lvl 50 = +15%
  xp_multiplier_per_level: 0.02       # At lvl 50 = +1.0x (total 2.0x)
  rare_creature_chance_per_level: 0.0  # Not scaled by level, boosted by equipment only

# Global settings
general:
  xp_multiplier: 1.2   # Multiplies all normal earned XP (40% lower than 2.0 baseline)

# Datapack extraction settings
datapack:
  name: "fishrework_fishing"
  write_legacy_alias: false

# Fishing tip notifications (shown only to players who recently fished)
fishing_tips:
  enabled: true
  check_interval_seconds: 30
  active_window_seconds: 600
  min_delay_seconds: 180
  max_delay_seconds: 420
  wiki_url: "https://eightl-projects.vercel.app"  # Used in tips that reference the wiki

# Mob Spawn Weights
# ─────────────────────────────────────────────────────────────
# GLOBAL mobs: These weights apply everywhere as the base rate.
# Biome-specific adjustments (for both passive and hostile mobs)
# are defined in BiomeFishingProfiles in code — NOT here.
#
# DO NOT add biome-only mobs here (e.g. creaking, tropical_fish).
# Their weights are controlled per-biome by BiomeFishingProfiles.
# Adding them here with chance: 0 would shadow the biome weights.
# ─────────────────────────────────────────────────────────────
mobs:
  # Global base fish (overridden per-biome by BiomeFishingProfiles)
  cod:
    chance: 30.0
  salmon:
    chance: 25.0
  squid:
    chance: 18.0
  pufferfish:
    chance: 12.0
  # Global hostile mobs (fallback when no biome profile exists)
  drowned:
    chance: 14.4
  guardian:
    chance: 5.0
  elder_guardian:
    chance: 1.4
  # Treasure chests (global, not biome-specific)
  treasure_common:
    chance: 2.5
  treasure_uncommon:
    chance: 1.2
  treasure_rare:
    chance: 0.5
  treasure_epic:
    chance: 0.25
  treasure_legendary:
    chance: 0.1

# Artifact Configuration
# Artifacts are rare collectibles found in treasure chests
artifacts:
  chance: 3.0  # % chance to find an artifact in a treasure chest (per chest rarity)

# Artifact Passive Buffs
# Applied while carrying unique artifacts in inventory/armor/offhand.
artifact_passives:
  scan_interval_ticks: 20
  caps:
    rare_creature_chance: 15.0
    treasure_chance: 15.0
    fishing_xp_bonus: 20.0
    double_catch_chance: 12.0
    fishing_speed: 20.0
    sea_creature_attack: 12.0
    sea_creature_defense: 12.0
    heat_resistance: 30.0

# Enchantment Configuration
enchantments:
  sea_creature_chance_max_level: 6  # Max level for Sea Creature Chance & Lure/LoTS enchants
  table_max_level: 3                # Max level obtainable directly from enchanting table for fishing enchants
  lure_cap: 3                       # Vanilla lure levels that still work normally (above = custom timing)
  ticks_per_lure_level: 100         # Ticks subtracted from wait time per lure level above cap
  lure_lots_level_boost: 3          # Bonus levels added to Lure/LoTS in enchanting table
  sea_creature_chance_per_level: 5.0  # % rare creature bonus per Sea Creature Chance enchant level
  lure_fishing_speed_per_level: 5   # Fishing speed bonus per Lure enchant level
  luck_of_sea_treasure_per_level: 2.0  # % treasure chance bonus per Luck of the Sea level
  default_min_wait_ticks: 100       # Base minimum fishing wait time (before Lure)
  default_max_wait_ticks: 600       # Base maximum fishing wait time (before Lure)

# Combat Configuration
combat:
  vex_despawn_seconds: 8            # How long vexes from fished evokers survive
  damage_indicator_enabled: true    # Show floating damage numbers on fished mobs
  damage_indicator_view_range: 32   # Block range at which damage numbers are visible
  damage_indicator_duration_ticks: 30  # How long damage numbers stay visible (30 = 1.5s)
  damage_indicator_offset_range: 0.5   # Random X/Z offset range for damage numbers
  damage_indicator_y_offset: 0.5       # Vertical offset above mob eye height
  ability_particles:
    global_scale: 1.0              # Global multiplier applied to all sea-creature ability particles (0.0-1.0)
    minimum_per_spawn: 1           # Keep at least this many particles per spawn call to avoid invisible abilities
  default_flat_defense: 1.0         # Baseline SC Defense when player has no upgrades
  default_flat_attack: 1.0          # Baseline SC Attack when player has no upgrades
  bobber_damage_radius: 10.0        # Block radius around player to search for fished mobs on reel-in
  gehenna_aoe:
