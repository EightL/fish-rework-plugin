# ═══════════════════════════════════════════════════════
#  Lava Fishing Configuration
# ═══════════════════════════════════════════════════════
lava_fishing:
  base_cast_ticks: 400              # Base upper bound for cast timer randomization
  lure_tick_reduction: 10           # Per-lure-tier reduction applied to lower random bound
  fishing_speed_divisor: 100.0      # Multiplier = divisor / (divisor + fishing_speed)
  min_bite_ticks: 100               # Minimum ticks before a bite occurs
  max_bite_ticks: 400               # Maximum ticks before a bite occurs
  reel_window_ticks: 70             # Ticks the player has to reel in after a bite
  nibble_sound_volume: 0.8          # Volume of the nibble sound
  bite_particle_count: 15           # Number of particles on bite
  approach_radius: 2.6              # Radius for random particle start positions around the bobber
  approach_duration_ticks: 22       # Ticks for the particle trail to travel to the bobber
  approach_particles_per_tick: 2    # Particles spawned each tick for the moving trail
  approach_particle: FLAME          # Particle used for the moving trail (e.g. FLAME, LAVA, ASH)
  approach_bite_distance: 0.45      # Bite triggers when the trail point is this close to the bobber
  float_bob_amplitude: 0.03         # Vertical bobbing height while floating on lava
  float_bob_speed: 0.28             # Vertical bobbing speed while floating on lava

# ═══════════════════════════════════════════════════════
#  Heat System Configuration
# ═══════════════════════════════════════════════════════
heat:
  gain_per_catch: 8.0               # Heat gained per lava catch
  gain_per_hostile: 10.0            # Extra heat when a hostile mob spawns
  gain_per_legendary: 16.0          # Extra heat for legendary catches
  decay_per_tick: 1.0               # Heat lost per decay tick
  decay_interval_seconds: 10        # Seconds between passive heat decay
  fishing_penalty_max_chance_at_100_heat: 0.55   # 55% proc chance per catch at 100 heat (scales linearly)
  fishing_penalty_slowness_ticks: 100            # 5s slowness on proc
  fishing_penalty_slowness_amplifier: 1          # Slowness II
  fishing_penalty_weakness_ticks: 120            # 6s weakness on proc
  fishing_penalty_weakness_amplifier: 0          # Weakness I
  fishing_penalty_raw_damage: 4.0                # Raw damage on damage proc (2 hearts)
  magma_filter_resistance_percent: 50.0          # Temporary extra heat resistance from Magma Filter
  magma_filter_duration_seconds: 300             # Duration of Magma Filter resistance buff
  # Tier thresholds
  warm_threshold: 25.0
  hot_threshold: 50.0
  scorching_threshold: 75.0
  infernal_threshold: 90.0
  # Tier SCC bonuses (%)
  warm_scc_bonus: 10.0
  hot_scc_bonus: 25.0
  scorching_scc_bonus: 50.0
  infernal_scc_bonus: 100.0

gui:
  mobs_per_page: 21                 # Items per page in Collection/XP Sources GUIs
  leaderboard_size: 10              # Number of entries on the leaderboard
  boss_bar_duration_ticks: 100      # How long XP boss bar stays visible (100 = 5s)
  levelup_title_fade_in_ms: 500     # Level-up title fade in duration
  levelup_title_stay_ms: 3000       # Level-up title stay duration
  levelup_title_fade_out_ms: 1000   # Level-up title fade out duration

# Sea Creature Upgrade Tiers
# Each tier maps a material to a flat SC bonus multiplier.
# tier_level is used for ordering (higher = better).
sea_creature_upgrade:
  tiers:
    copper:
      material: COPPER_INGOT
      bonus: 0.5
      tier_level: 1
    iron:
      material: IRON_INGOT
      bonus: 1.0
      tier_level: 2
    gold:
      material: GOLD_INGOT
      bonus: 1.5
      tier_level: 3
    diamond:
      material: DIAMOND
      bonus: 2.0
      tier_level: 4
    netherite:
      material: NETHERITE_INGOT
      bonus: 2.5
      tier_level: 5

# ═══════════════════════════════════════════════════════
#  Balance Tuning — Mob Behavior
# ═══════════════════════════════════════════════════════
mob_balance:
  size_variance_percent: 0.3        # Max random size/weight variance (0.3 = 0-30%)
  hostile_default_health_mult: 2.0  # Default health multiplier for hostile mobs without explicit config
  hostile_default_damage_mult: 1.4  # Default damage multiplier for hostile mobs without explicit config
  initial_aggro_range: 32           # Range (blocks) to find nearest player for initial aggro
  hostile_retarget_range: 24.0      # Range for hostile mobs to find new target when current is lost
  passive_aggro_search_range: 32.0  # Range for passive-aggro mobs to search for players
  passive_aggro_velocity_mult: 0.15 # Speed multiplier for passive-aggro velocity chase
  passive_aggro_max_velocity: 1.5   # Max velocity cap for passive-aggro mobs
  passive_aggro_y_velocity_factor: 0.3  # How much Y-velocity is applied (for water/flying mobs)
  glow_squid_y_threshold: 30        # Below this Y level, glow squid can spawn anywhere
  glow_squid_depth_weight: 5.0      # Spawn weight for glow squid below Y threshold
  night_start_time: 13000           # World time (ticks) when night begins for hostile spawns
  night_end_time: 23000             # World time (ticks) when night ends for hostile spawns
  # Pull-toward-player mechanic (when fishing up a mob)
  pull_max_duration_ticks: 60       # Max duration of pull effect (60 = 3 seconds)
  pull_stop_distance: 2.0           # Stop pulling when mob is within this many blocks
  pull_max_speed: 1.2               # Maximum pull velocity
  pull_speed_multiplier: 0.15       # Pull speed scales with distance * this value
  pull_initial_delay_ticks: 2       # Ticks before pull starts
  pull_interval_ticks: 5            # Pull velocity applied every N ticks
  # Group kill & slime mechanics
  slime_min_split_size: 2           # Slimes won't split below this size
  slime_child_aggro_range: 32       # Range for slime children to target players
  group_kill_check_delay_ticks: 5   # Delay before checking if all group members are dead (slimes)
  group_search_radius_h: 40         # Horizontal search radius for remaining group members
  group_search_radius_v: 20         # Vertical search radius for remaining group members
  reward_dedup_window_ticks: 20     # Prevents double rewards within this tick window
  sibling_remove_radius_h: 20       # Horizontal range for removing mob siblings on death
  sibling_remove_radius_v: 10       # Vertical range for removing mob siblings on death
  cooldown_cleanup_interval: 200    # Ticks between aggro cooldown map cleanup

# ═══════════════════════════════════════════════════════
#  Balance Tuning — Items & Equipment
# ═══════════════════════════════════════════════════════
item_balance:
  harmony_rod_land_mob_multiplier: 2.0  # Land mob chance multiplier when using Harmony Rod
  deadman_armor_night_multiplier: 2.0   # Deadman armor bonus multiplier at night
  sc_flat_bonus_per_tier: 0.5           # Flat SC Attack/Defense bonus per upgrade tier level

# ═══════════════════════════════════════════════════════
#  Balance Tuning — Treasure Chests
# ═══════════════════════════════════════════════════════
treasure_balance:
  power_curve_exponent: 3.0         # Power curve for treasure chance scaling
  # Fallback treasure rarity distribution (cumulative thresholds, must be ascending)
  fallback_common_threshold: 50.0   # 0-50 = Common (50%)
  fallback_uncommon_threshold: 75.0 # 50-75 = Uncommon (25%)
  fallback_rare_threshold: 90.0     # 75-90 = Rare (15%)
  fallback_epic_threshold: 98.0     # 90-98 = Epic (8%), rest = Legendary (2%)
  # Loot tier selection weights (cumulative thresholds for extra items)
  loot_tier_common_threshold: 40.0
  loot_tier_uncommon_threshold: 70.0
  loot_tier_rare_threshold: 90.0    # rest = Epic
  # Unique item count distribution (cumulative thresholds)
  item_count_7_threshold: 30.0      # 30% chance for 7 items
  item_count_8_threshold: 55.0      # 25% chance for 8 items
  item_count_9_threshold: 75.0      # 20% chance for 9 items
  item_count_10_threshold: 87.0     # 12% chance for 10 items
  item_count_11_threshold: 95.0     # 8% chance for 11 items, rest = 12
  split_stack_chance: 50.0          # % chance to split item stacks across slots
  suspicious_stew_duration_ticks: 200  # Duration of suspicious stew effects
  suspicious_stew_amplifier: 0      # Amplifier level for suspicious stew effects

# ═══════════════════════════════════════════════════════
#  Balance Tuning — Treasure Totems
# ═══════════════════════════════════════════════════════
totems:
  buff_radius: 10.0                 # Totem buff range in blocks
  treasure_bonus: 5.0               # Treasure chance bonus % for nearby players
  battle_totem_1_attack_modifier: 1.0 # Sea creature attack modifier from Battle Totem I
  battle_totem_2_attack_modifier: 2.0 # Sea creature attack modifier from Battle Totem II
  battle_totem_3_attack_modifier: 3.0 # Sea creature attack modifier from Battle Totem III
  rotation_speed: 0.1               # Totem spin speed multiplier
  bob_frequency: 0.08               # Vertical bobbing frequency
  bob_amplitude: 0.15               # Vertical bobbing amplitude (blocks)

