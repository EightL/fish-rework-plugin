# ════════════════════════════════════════════════════════════
#  Feature Toggles
#  Disable individual modules for your server. All enabled by default.
#  NOTE: Disabling economy automatically disables shop.
#        Disabling fish_bag also disables lava_bag.
# ════════════════════════════════════════════════════════════
features:
  # Economy & Shop
  economy_enabled: true          # Doubloon balance tracking. Disabling also disables shop.
  shop_enabled: true             # /fish shop buy/sell GUI
  auto_sell_enabled: true        # /fish autosell command

  # GUIs & Menus
  upgrade_gui_enabled: true      # ⚔ Upgrade Gear menu (requires Fishing Lv 20)
  leaderboard_enabled: true      # /fish top leaderboard
  recipe_browser_enabled: true   # /fish recipe browser
  encyclopedia_enabled: true     # /fish encyclopedia (fishing collection)
  artifact_collection_enabled: true  # /fish artifacts collection
  artifact_passives_enabled: true    # Passive buffs from carried artifacts

  # Gameplay
  lava_fishing_enabled: true     # Nether lava fishing system
  heat_system_enabled: true      # Heat gauge mechanic (requires lava_fishing_enabled)
  treasure_chests_enabled: true  # Treasure chest drops while fishing
  custom_mobs_enabled: true      # Custom sea creature spawning
  bait_system_enabled: true      # Bait items and offhand bonuses
  custom_recipes_enabled: true   # Custom crafting recipes
  advancements_enabled: true     # Custom advancement tree
  display_case_enabled: true     # Display case furniture
  treasure_totem_enabled: true   # Treasure Totem placeable item
  fish_bag_enabled: true         # Fish Bag storage (also controls lava_bag)
  lava_bag_enabled: true         # Magma Satchel UI/opening (requires fish_bag_enabled)

  # Visual / QOL
  damage_indicators_enabled: true    # Floating damage numbers
  catch_broadcast_enabled: true      # Broadcast rare catches server-wide
  fishing_tips_enabled: true         # Periodic fishing tips (overrides fishing_tips.enabled)
  catch_streak_enabled: true         # Catch streak XP multiplier system
  double_catch_enabled: true         # Double catch chance mechanic
