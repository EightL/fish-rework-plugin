name: FishRework
version: ${version}
main: com.fishrework.FishRework
api-version: '1.21'
authors: [Fish Rework]
description: A custom fishing rework plugin for Paper servers.
website: https://github.com/EightL/fish-rework
softdepend: [AuraSkills]
libraries:
  - org.xerial:sqlite-jdbc:3.46.0.0

commands:
  fishing:
    description: Opens the fishing menu
    usage: /fishing [subcommand]
    aliases: [fish, fs]
    permission: fishrework.use
    permission-message: You do not have permission to use this command.

permissions:
  fishrework.use:
    description: Allows use of fishing commands
    default: true
  fishrework.admin:
    description: Allows admin management of fishing
    default: op
  fishrework.reload:
    description: Allows reloading the Fish Rework config
    default: op
