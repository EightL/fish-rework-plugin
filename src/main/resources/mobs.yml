# =============================================================================
# Mob Definitions for Fishing Rework
# =============================================================================
# This file contains all mob definitions used by the fishing system.
#
# Structure:
#   entity_type:        The Bukkit EntityType to spawn
#   display_name:       The custom display name shown to players
#   xp:                 Experience awarded when caught/killed
#   base_weight:        Weight in kg used for fishing mechanics
#   default_chance:     Base % chance to encounter (0.0 = biome-specific only)
#   category:           PASSIVE | HOSTILE | TREASURE
#   required_level:     Minimum fishing level required
#   boost_by_rare_creature: Whether Rare Creature enchant boosts spawn chance
#   collection_icon:    Material used as icon in the collection GUI
#   collection_name:    Display name in the collection GUI
#   rarity:             COMMON | UNCOMMON | RARE | EPIC | LEGENDARY
#   drops:              List of item drops (omitted if none)
#     - item:           Custom item ID from ItemManager
#     - vanilla:        Vanilla Minecraft material
#     - random_item:    List of custom item IDs to pick from randomly
#     - treasure_loot:  RANDOM (treasureManager) or rarity (itemManager)
#     - chance:         Drop chance (0.0 - 1.0)
#     - min / max:      Min and max quantity
# =============================================================================

